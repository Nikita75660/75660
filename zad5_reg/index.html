<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Formularz kontaktowy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>Formularz kontaktowy</h2>

  <form id="formularz">
    <div class="field">
      <input type="text" id="imie" placeholder="Imię">
      <div class="error" id="imieError"></div>
    </div>

    <div class="field">
      <input type="text" id="nazwisko" placeholder="Nazwisko">
      <div class="error" id="nazwiskoError"></div>
    </div>

    <div class="field">
      <input type="email" id="email" placeholder="Email">
      <div class="error" id="emailError"></div>
    </div>

    <div class="field">
      <textarea id="wiadomosc" placeholder="Wiadomość"></textarea>
      <div class="error" id="wiadomoscError"></div>
    </div>

    <button type="submit">Wyślij</button>
  </form>
</div>

<script src="script.js"></script>

</body>
</html>
