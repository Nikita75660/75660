<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Nikita Korchahin 75660 - CV</title>
    <link rel="stylesheet" href="green.css">
</head>
<body>

<header>
    <h1>Nikita Korchahin 75660</h1>
    <img src="photo.jpg" alt="Zdjęcie" width="150">
</header>

<main>
    <button class="btn" onclick="changeTheme()">Zmień motyw</button>

    <section>
        <h2>Kontakt</h2>
        <p>Email: <a href="mailto:nkorcha1@stu.vistula.edu.pl">nkorcha1@stu.vistula.edu.pl</a></p>
        <p>Telefon: <a href="tel:+48575176801">+48 575 176 801</a></p>
        <p>Miasto: Warszawa</p>
    </section>

    <section>
        <h2>O mnie</h2>
        <p id="about"></p>
    </section>

    <button class="btn" onclick="toggle('skills')">Pokaż / Ukryj Umiejętności</button>
    <section id="skills">
        <h2>Umiejętności</h2>
        <ul id="skills-list"></ul>
    </section>

    <button class="btn" onclick="toggle('experience')">Pokaż / Ukryj Doświadczenie</button>
    <section id="experience">
        <h2>Doświadczenie</h2>
        <div id="experience-list"></div>
    </section>

    <button class="btn" onclick="toggle('education')">Pokaż / Ukryj Edukację</button>
    <section id="education">
        <h2>Edukacja</h2>
        <p id="education-text"></p>
    </section>

    <button class="btn" onclick="toggle('projects')">Pokaż / Ukryj Projekty</button>
    <section id="projects">
        <h2>Projekty</h2>
        <ul id="projects-list"></ul>
    </section>

</main>
<section id="formularzKontaktowy">
    <h2>Formularz kontaktowy</h2>

    <form id="formularz" novalidate>
        <input type="text" id="imie" placeholder="Imię">
        <div class="error" id="imieError"></div>

        <input type="text" id="nazwisko" placeholder="Nazwisko">
        <div class="error" id="nazwiskoError"></div>

        <input type="email" id="email" placeholder="Email">
        <div class="error" id="emailError"></div>

        <textarea id="wiadomosc" placeholder="Wiadomość"></textarea>
        <div class="error" id="wiadomoscError"></div>

        <button type="submit" class="btn">Wyślij</button>
    </form>
</section>
<footer>
    <p>© 2026 Nikita Korchahin</p>
</footer>

<script src="script.js"></script>

</body>
</html>
